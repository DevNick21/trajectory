name: refresh-gov-data

# Weekly cron that re-runs scripts/fetch_gov_data.py and commits any
# updated parquet files + freshness sidecars back to the default branch.
# Keeps the Sponsor Register / going-rates / SOC / ASHE snapshots
# under the 14-day STALE window that sponsor_register.py enforces.

on:
  schedule:
    # Monday 03:00 UTC — after ONS and Home Office typically publish
    # late-Friday / weekend updates.
    - cron: "0 3 * * 1"
  workflow_dispatch:  # manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch gov data
        run: python scripts/fetch_gov_data.py
        env:
          PYTHONPATH: src
      - name: Commit refreshed parquets
        run: |
          git config user.name "trajectory-bot"
          git config user.email "noreply@anthropic.com"
          git add data/processed/
          if git diff --cached --quiet; then
            echo "No gov data changes to commit."
          else
            git commit -m "chore(data): weekly gov data refresh"
            git push
          fi
